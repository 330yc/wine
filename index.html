<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="My Wine">
<meta name="theme-color" content="#FAF6F0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,400;1,600&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --header-bg: #FAF6F0;
    --body-bg: #FFFFFF;
    --rose-gold: #C0826A;
    --ink: #3A2E28;
    --muted: #AA9080;
    --border: rgba(192,130,106,0.15);
    --border-strong: rgba(192,130,106,0.25);
    --shadow: rgba(58,46,40,0.06);
    --card-bg: #FFFFFF;
    --thumb-bg: #F5EDE4;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Lato', sans-serif;
    background: var(--body-bg);
    color: var(--ink);
    min-height: 100vh;
  }

  /* Header */
  header {
    background: var(--header-bg);
    padding: 1.5rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border-strong);
  }
  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    font-weight: 600;
    font-style: italic;
    color: var(--rose-gold);
    letter-spacing: 0.02em;
  }

  /* Layout */
  .main { padding: 1.5rem 2rem; min-height: calc(100vh - 80px); background: #fff; }

  @media (max-width: 768px) {
    header { padding: 1.25rem; }
    .logo { font-size: 1.5rem; }
    .main { padding: 1rem; }
  }

  /* FAB */
  .fab {
    position: fixed;
    bottom: 2rem;
    right: 2rem;
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: var(--rose-gold);
    border: none;
    color: #fff;
    font-size: 1.6rem;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(192,130,106,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s, transform 0.15s;
    z-index: 50;
    line-height: 1;
  }
  .fab:hover { background: #A86E58; transform: scale(1.08); }

  /* Add wine modal form styles */
  .add-modal-body { padding: 1.25rem 1.5rem; }

  /* Upload zone */
  .upload-zone {
    border: 1.5px dashed var(--border-strong);
    border-radius: 8px;
    padding: 1.5rem 1rem;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--thumb-bg);
    position: relative;
    margin-bottom: 1rem;
  }
  .upload-zone:hover { background: #EEE0D5; }
  .upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; }
  .upload-icon {
    font-size: 2rem;
    color: var(--rose-gold);
    margin-bottom: 0.5rem;
  }
  .upload-label { font-size: 0.85rem; color: var(--muted); line-height: 1.5; }

  /* Preview */
  .preview-wrap { margin-bottom: 1rem; text-align: center; }
  .preview-img {
    width: 100%;
    max-height: 220px;
    object-fit: contain;
    border-radius: 6px;
    border: 1px solid var(--border);
  }

  /* Form */
  .form-group { margin-bottom: 0.75rem; }
  .form-group label {
    display: block;
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.3rem;
  }
  .form-group input,
  .form-group select,
  .form-group textarea {
    width: 100%;
    padding: 0.5rem 0.7rem;
    border: 1px solid var(--border-strong);
    border-radius: 6px;
    background: #fff;
    font-family: 'Lato', sans-serif;
    font-size: 0.875rem;
    color: var(--ink);
    transition: border-color 0.2s;
  }
  .form-group input:focus,
  .form-group select:focus,
  .form-group textarea:focus {
    outline: none;
    border-color: var(--rose-gold);
  }
  .form-group textarea { resize: vertical; min-height: 60px; }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; }

  /* Buttons */
  .btn-analyze {
    width: 100%;
    padding: 0.65rem;
    background: var(--thumb-bg);
    color: var(--rose-gold);
    border: 1px solid var(--border-strong);
    border-radius: 6px;
    font-family: 'Lato', sans-serif;
    font-size: 0.85rem;
    font-weight: 400;
    cursor: pointer;
    transition: background 0.2s;
    margin-bottom: 0.5rem;
    letter-spacing: 0.03em;
  }
  .btn-analyze:hover:not(:disabled) { background: #EEE0D5; }
  .btn-analyze:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-save {
    width: 100%;
    padding: 0.65rem;
    background: var(--rose-gold);
    color: #fff;
    border: none;
    border-radius: 6px;
    font-family: 'Lato', sans-serif;
    font-size: 0.85rem;
    font-weight: 400;
    cursor: pointer;
    transition: background 0.2s;
    letter-spacing: 0.03em;
  }
  .btn-save:hover:not(:disabled) { background: #A86E58; }
  .btn-save:disabled { opacity: 0.5; cursor: not-allowed; }

  .analyzing-bar {
    text-align: center;
    padding: 0.75rem;
    font-size: 0.8rem;
    color: var(--muted);
    display: none;
  }
  .dot { animation: blink 1.2s infinite; display: inline-block; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,80%,100%{opacity:0.2} 40%{opacity:1} }

  /* Wine list */
  .wine-grid {
    display: flex;
    flex-direction: column;
    gap: 0;
    margin-top: 0;
  }

  .wine-card {
    display: flex;
    gap: 14px;
    align-items: flex-start;
    padding: 0 0 0 0;
    border-bottom: 0.5px solid var(--border);
    cursor: pointer;
    transition: background 0.15s;
  }
  .wine-card:first-child { border-top: 0.5px solid var(--border); }
  .wine-card:hover { background: #FDF9F6; }
  @media (max-width: 768px) { }
  @keyframes fadeUp { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }

  .card-img {
    width: 64px;
    min-width: 64px;
    height: 88px;
    background: var(--thumb-bg);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    border-radius: 4px;
    overflow: hidden;
  }
  .card-img img { width: 100%; height: 100%; object-fit: cover; }
  .card-img-placeholder {
    width: 64px;
    min-width: 64px;
    height: 88px;
    background: var(--thumb-bg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.8rem;
    flex-shrink: 0;
    border-radius: 4px;
  }

  .card-body {
    padding: 0.6rem 1rem 0.75rem;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 10px;
    min-width: 0;
    justify-content: flex-start;
  }
  .wine-card:nth-child(even) { background: #FDFAF7; }
  .card-row1 {
    display: grid;
    grid-template-columns: minmax(0, 1.2fr) auto auto auto;
    align-items: center;
    gap: 6px;
  }
  .card-name {
    font-family: 'Playfair Display', serif;
    font-size: 1.15rem;
    font-weight: 600;
    font-style: italic;
    color: var(--ink);
    line-height: 1.3;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card-row2 {
    display: grid;
    grid-template-columns: 22px minmax(0, 1.2fr) minmax(0, 1.8fr) minmax(0, 2fr);
    align-items: center;
    gap: 0;
  }
  .flag-circle {
    width: 22px; height: 22px; border-radius: 50%;
    background: var(--thumb-bg);
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 14px; overflow: hidden;
    border: 0.5px solid var(--border);
    flex-shrink: 0;
  }
  .card-row2-first {
    font-size: 0.82rem; color: var(--muted);
    padding-left: 8px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    font-family: 'Lato', sans-serif;
  }
  .card-row2-cell {
    font-size: 0.82rem; color: var(--muted);
    padding-left: 10px;
    border-left: 1px solid var(--border-strong);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    font-family: 'Lato', sans-serif;
  }
  .card-row3 {
    font-size: 0.82rem;
    color: #BB9F90;
    line-height: 1.6;
    font-family: 'Lato', sans-serif;
  }

  .badge {
    font-size: 0.7rem;
    padding: 3px 9px;
    border-radius: 99px;
    font-weight: 500;
    white-space: nowrap;
    font-family: 'Lato', sans-serif;
  }
  .badge-red { background: #FCEEE9; color: #A0522D; }
  .badge-white { background: #FBF6E3; color: #7A6200; }
  .badge-rose { background: #FCEEF3; color: #8B3052; }
  .badge-sparkling { background: #E8F2FB; color: #1A5F8A; }
  .badge-year { background: var(--thumb-bg); color: var(--muted); }
  .badge-alc {
    background: #F0EBF8; color: #7A5A9A;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 3px 8px;
    font-variant-numeric: tabular-nums;
    gap: 0;
  }
  .badge-alc .alc-int {
    display: inline-block;
    min-width: 18px;
    text-align: right;
  }
  .badge-alc .alc-dec {
    display: inline-block;
    text-align: left;
  }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--muted);
  }
  .empty-state-icon { font-size: 3rem; margin-bottom: 1rem; opacity: 0.4; }
  .empty-state p { font-size: 0.9rem; line-height: 1.6; font-family: 'Lato', sans-serif; }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(58,46,40,0.5);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: #fff;
    border-radius: 12px;
    max-width: 560px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    animation: fadeUp 0.25s ease;
  }
  .modal-header {
    padding: 1.25rem 1.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--header-bg);
  }
  .modal-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem;
    font-weight: 600;
    font-style: italic;
    color: var(--rose-gold);
  }
  .modal-close {
    background: none; border: none; cursor: pointer;
    font-size: 1.2rem; color: var(--muted); padding: 4px;
  }
  .modal-body { padding: 1.5rem; }
  .modal-img {
    width: 100%;
    max-height: 280px;
    object-fit: contain;
    border-radius: 8px;
    margin-bottom: 1.25rem;
    border: 1px solid var(--border);
  }
  .modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem 1.5rem; }
  .modal-field label { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); font-weight: 400; display: block; margin-bottom: 2px; font-family: 'Lato', sans-serif; }
  .modal-field p { font-size: 0.9rem; color: var(--ink); font-family: 'Lato', sans-serif; }
  .modal-field.full { grid-column: span 2; }
  .modal-actions {
    padding: 0.85rem 1.25rem;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .modal-actions-right { display: flex; gap: 8px; }

  .chip-tasted {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 14px; border-radius: 99px;
    font-size: 0.78rem; font-family: 'Lato', sans-serif;
    cursor: pointer; border: 1px solid rgba(192,130,106,0.3);
    background: #F5EDE4; color: #C0826A;
    transition: all 0.15s; font-weight: 400;
  }
  .chip-tasted:hover { background: #EEE0D5; }
  .chip-tasted.active {
    background: #C0826A; border-color: #C0826A; color: #fff;
  }
  .chip-tasted .check-mark {
    width: 15px; height: 15px;
    background: #fff; border-radius: 3px;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 700; color: #C0826A;
    flex-shrink: 0;
  }

  .circle-btn {
    width: 28px; height: 28px; border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    cursor: pointer; border: 1px solid;
    transition: all 0.15s; font-size: 11px; line-height: 1;
  }
  .circle-delete { background: #FEF2F2; border-color: #fca5a5; color: #dc2626; }
  .circle-delete:hover { background: #fee2e2; }
  .circle-edit { background: #F5EDE4; border-color: rgba(192,130,106,0.3); color: #C0826A; }
  .circle-edit:hover { background: #EEE0D5; }
  .circle-confirm { background: #F5EDE4; border-color: rgba(192,130,106,0.3); color: #AA9080; }
  .circle-confirm.ready { color: #C0826A; cursor: pointer; }
  .circle-confirm.ready:hover { background: #EEE0D5; }

  .star-pick {
    background: none; border: none; cursor: pointer;
    font-size: 1.6rem; color: #E0D0C8;
    transition: color 0.15s; padding: 0; line-height: 1;
  }
  .star-pick.lit { color: #C0826A; }

  .drunk-badge {
    display: inline-block;
    font-size: 0.65rem;
    padding: 2px 8px;
    border-radius: 99px;
    background: #E8F2FB;
    color: #1A5F8A;
    font-family: 'Lato', sans-serif;
    margin-left: 6px;
    vertical-align: middle;
  }

  .toggle-wrap {
    display: inline-grid;
    grid-template-columns: 1fr 1fr;
    align-items: center;
    background: #F5EDE4;
    border-radius: 99px;
    padding: 3px;
    position: relative;
    border: 1px solid rgba(192,130,106,0.2);
    margin-bottom: 1.25rem;
  }
  .toggle-option {
    font-family: 'Playfair Display', serif;
    font-size: 14px; font-style: italic; font-weight: 600;
    padding: 6px 20px;
    border-radius: 99px;
    cursor: pointer;
    border: none; background: none;
    color: #AA9080;
    transition: color 0.2s;
    position: relative; z-index: 1;
    white-space: nowrap;
    text-align: center;
  }
  .toggle-option.active { color: #fff; }
  .toggle-slider {
    position: absolute;
    top: 3px; bottom: 3px;
    border-radius: 99px;
    background: #D4A090;
    transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    z-index: 0;
  }

  .toast {
    position: fixed;
    bottom: 2rem;
    right: 2rem;
    background: var(--ink);
    color: #fff;
    padding: 0.75rem 1.25rem;
    border-radius: 8px;
    font-size: 0.85rem;
    z-index: 200;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.3s;
    pointer-events: none;
    font-family: 'Lato', sans-serif;
  }
  .toast.show { opacity: 1; transform: translateY(0); }

  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 0.75rem 0;
  }

  .form-group label {
    display: block;
    font-size: 0.7rem;
    font-weight: 400;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.3rem;
    font-family: 'Lato', sans-serif;
  }
</style>
</head>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, query, orderBy, updateDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyCwUGWS2R58Ys_aqTfSD44WqsFo3OcdLMk",
  authDomain: "wine-60184.firebaseapp.com",
  projectId: "wine-60184",
  storageBucket: "wine-60184.firebasestorage.app",
  messagingSenderId: "589747615031",
  appId: "1:589747615031:web:d7a594db8ddc602c3096b2"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

let currentFiles = [];
let wines = [];
let modalWineId = null;
let currentTab = 'stock';

// Multi-select file upload
document.getElementById('fileInput1').addEventListener('change', e => {
  const files = Array.from(e.target.files).slice(0, 3);
  if (!files.length) return;
  currentFiles = files;
  const strip = document.getElementById('previewStrip');
  strip.innerHTML = '';
  strip.style.display = 'flex';
  files.forEach(f => {
    const img = document.createElement('img');
    img.style.cssText = 'width:80px;height:110px;object-fit:cover;border-radius:4px;border:0.5px solid rgba(192,130,106,0.2)';
    const r = new FileReader();
    r.onload = ev => img.src = ev.target.result;
    r.readAsDataURL(f);
    strip.appendChild(img);
  });
  document.getElementById('analyzeBtn').disabled = false;
});

// Analyze
document.getElementById('analyzeBtn').addEventListener('click', async () => {
  if (!currentFiles.length) return;
  document.getElementById('analyzeBtn').disabled = true;
  document.getElementById('analyzingBar').style.display = 'block';

  try {
    const images = [];
    for (const f of currentFiles) {
      const b64 = await compressImage(f);
      images.push({ mime_type: 'image/jpeg', data: b64 });
    }

    const resp = await fetch('https://wine.u8934039.workers.dev', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ images })
    });

    console.log('Worker 回應狀態：', resp.status);
    const text = await resp.text();
    console.log('Worker 回傳內容：', text);
    const info = JSON.parse(text);
    fillForm(info);
    showToast('辨識完成，請確認資料');
  } catch(e) {
    console.error('辨識錯誤：', e);
    showToast('辨識失敗，請手動填寫');
  }

  document.getElementById('analyzeBtn').disabled = false;
  document.getElementById('analyzingBar').style.display = 'none';
});

function fillForm(info) {
  const map = { name:'f-name', winery:'f-winery', vintage:'f-vintage', type:'f-type', country:'f-country', region:'f-region', grape:'f-grape', alcohol:'f-alcohol', notes:'f-notes' };
  Object.entries(map).forEach(([k, id]) => {
    const el = document.getElementById(id);
    if (el && info[k]) el.value = info[k];
  });
}

function toBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(',')[1]);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

function compressImage(file, maxWidth = 1024, quality = 0.7) {
  return new Promise((res) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      const canvas = document.createElement('canvas');
      let w = img.width, h = img.height;
      if (w > maxWidth) { h = Math.round(h * maxWidth / w); w = maxWidth; }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      URL.revokeObjectURL(url);
      canvas.toBlob(blob => {
        const reader = new FileReader();
        reader.onload = () => res(reader.result.split(',')[1]);
        reader.readAsDataURL(blob);
      }, 'image/jpeg', quality);
    };
    img.src = url;
  });
}

// Save
document.getElementById('saveBtn').addEventListener('click', async () => {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { showToast('請至少填入酒名'); return; }

  document.getElementById('saveBtn').disabled = true;
  document.getElementById('saveBtn').textContent = 'Saving…';

  try {
    let imageUrl = '';
    let imagePath = '';

    if (currentFiles.length) {
      const f = currentFiles[0];
      imagePath = `labels/${Date.now()}_${f.name}`;
      const storageRef = ref(storage, imagePath);
      await uploadBytes(storageRef, f);
      imageUrl = await getDownloadURL(storageRef);
    }

    const wine = {
      name,
      winery: document.getElementById('f-winery').value,
      vintage: document.getElementById('f-vintage').value,
      type: document.getElementById('f-type').value,
      country: document.getElementById('f-country').value,
      region: document.getElementById('f-region').value,
      grape: document.getElementById('f-grape').value,
      alcohol: document.getElementById('f-alcohol').value,
      price: document.getElementById('f-price').value,
      tasting: '',
      notes: document.getElementById('f-notes').value,
      drunk: false,
      imageUrl,
      imagePath,
      createdAt: new Date().toISOString()
    };

    await addDoc(collection(db, 'wines'), wine);
    showToast('已加入酒窖 🍷');
    closeAddModal();
    resetForm();
    loadWines();
  } catch(e) {
    showToast('儲存失敗：' + e.message);
  }

  document.getElementById('saveBtn').disabled = false;
  document.getElementById('saveBtn').textContent = 'Save';
});

function resetForm() {
  ['f-name','f-winery','f-vintage','f-country','f-region','f-grape','f-alcohol','f-price','f-notes'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('f-type').value = '紅酒';
  currentFiles = [];
  document.getElementById('previewStrip').innerHTML = '';
  document.getElementById('previewStrip').style.display = 'none';
  document.getElementById('analyzeBtn').disabled = true;
  document.getElementById('fileInput1').value = '';
}

// Load wines
async function loadWines() {
  const q = query(collection(db, 'wines'), orderBy('createdAt', 'desc'));
  const snap = await getDocs(q);
  wines = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  renderWines();
}

function formatAlc(val) {
  if (!val) return '';
  const num = parseFloat(String(val).replace(/[^0-9.]/g, ''));
  if (isNaN(num)) return val;
  return num.toFixed(1) + '%';
}

function formatAlcBadge(val) {
  if (!val) return '';
  const num = parseFloat(String(val).replace(/[^0-9.]/g, ''));
  if (isNaN(num)) return `<span class="badge badge-alc">${val}</span>`;
  const fixed = num.toFixed(1);
  const [intPart, decPart] = fixed.split('.');
  return `<span class="badge badge-alc"><span class="alc-int">${intPart}</span><span class="alc-dec">.${decPart}%</span></span>`;
}

function titleCase(str) {
  if (!str) return '';
  return str.toLowerCase().replace(/(?:^|\s|[-\/·、])\S/g, c => c.toUpperCase());
}

function countryFlag(country) {
  const map = {
    '義大利':'🇮🇹','法國':'🇫🇷','美國':'🇺🇸','西班牙':'🇪🇸','德國':'🇩🇪',
    '澳洲':'🇦🇺','智利':'🇨🇱','阿根廷':'🇦🇷','紐西蘭':'🇳🇿','南非':'🇿🇦',
    '葡萄牙':'🇵🇹','奧地利':'🇦🇹','希臘':'🇬🇷','匈牙利':'🇭🇺','日本':'🇯🇵',
    '台灣':'🇹🇼','中國':'🇨🇳','英國':'🇬🇧','加拿大':'🇨🇦','以色列':'🇮🇱',
    '黎巴嫩':'🇱🇧','喬治亞':'🇬🇪','克羅埃西亞':'🇭🇷','斯洛維尼亞':'🇸🇮',
  };
  return map[country] || '🌍';
}

window.switchTab = function(tab) {
  currentTab = tab;
  const stockBtn = document.getElementById('tab-stock');
  const drunkBtn = document.getElementById('tab-drunk');
  const slider = document.getElementById('toggleSlider');
  stockBtn.classList.toggle('active', tab === 'stock');
  drunkBtn.classList.toggle('active', tab === 'drunk');
  slider.style.left = tab === 'stock' ? '3px' : '50%';
  slider.style.width = 'calc(50% - 3px)';
  renderWines();
}

function renderWines() {
  const grid = document.getElementById('wineGrid');
  const filtered = wines.filter(w => currentTab === 'drunk' ? w.drunk : !w.drunk);

  if (!filtered.length) {
    const msg = currentTab === 'drunk' ? 'No tasted wines yet' : '酒窖尚無藏酒<br>點右下角 ＋ 開始建檔';
    grid.innerHTML = `<div class="empty-state"><div class="empty-state-icon">${currentTab === 'drunk' ? '🥂' : '🍾'}</div><p>${msg}</p></div>`;
    return;
  }

  grid.innerHTML = filtered.map(w => {
    const badgeClass = {'紅酒':'badge-red','白酒':'badge-white','粉紅酒':'badge-rose','氣泡酒':'badge-sparkling'}[w.type] || 'badge-red';
    const imgHtml = w.imageUrl
      ? `<div class="card-img"><img src="${w.imageUrl}" alt="${esc(w.name)}" loading="lazy"></div>`
      : `<div class="card-img-placeholder">🍷</div>`;
    const flag = w.country ? countryFlag(w.country) : '';
    return `<div class="wine-card" onclick="openModal('${w.id}')">
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px;flex-shrink:0;padding-top:0.6rem;padding-bottom:0.75rem;padding-left:0">
        ${imgHtml}
        <span class="badge badge-year" style="font-size:0.6rem;min-width:64px;text-align:center;display:inline-block">${w.price ? 'NT$ ' + Number(w.price).toLocaleString() : '—'}</span>
      </div>
      <div class="card-body">
        <div class="card-row1">
          <div class="card-name">${esc(titleCase(w.name))}</div>
          <span class="badge ${badgeClass}">${esc(w.type)}</span>
          ${w.vintage ? `<span class="badge badge-year">${esc(w.vintage)}</span>` : ''}
          ${w.alcohol ? formatAlcBadge(w.alcohol) : ''}
        </div>
        <div class="card-row2">
          <div style="font-size:16px;line-height:1">${flag}</div>
          <div class="card-row2-first">${esc(titleCase(w.winery || ''))}</div>
          <div class="card-row2-cell">${esc(titleCase(w.region || ''))}</div>
          <div class="card-row2-cell">${esc(titleCase(w.grape || ''))}</div>
        </div>
        ${w.notes ? `<div class="card-row3">${esc(w.notes)}</div>` : ''}
        ${w.drunk && w.rating ? `<div style="font-size:1rem;color:#C0826A;letter-spacing:2px">${'★'.repeat(w.rating)}${'☆'.repeat(5-w.rating)}</div>` : ''}
      </div>
    </div>`;
  }).join('');
}

// Add wine modal
window.openAddModal = function() {
  document.getElementById('addModalOverlay').classList.add('open');
};
window.closeAddModal = function() {
  document.getElementById('addModalOverlay').classList.remove('open');
};
document.getElementById('addModalOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('addModalOverlay')) closeAddModal();
});

// Detail Modal
window.openModal = function(id) {
  const w = wines.find(w => w.id === id);
  if (!w) return;
  modalWineId = id;
  document.getElementById('modalTitle').textContent = titleCase(w.name);

  const img = document.getElementById('modalImg');
  if (w.imageUrl) { img.src = w.imageUrl; img.style.display = 'block'; }
  else img.style.display = 'none';

  const chip = document.getElementById('tastedChip');
  if (w.drunk) {
    chip.classList.add('active');
  } else {
    chip.classList.remove('active');
  }
  document.getElementById('tastedPanel').style.display = 'none';
  currentTastedRating = 0;
  updateStarPicks(0);
  const today = new Date().toISOString().slice(0,10);
  document.getElementById('tastedNotes').value = w.drunk ? (w.tasting || '') : today;

  document.getElementById('modalGrid').innerHTML = `
    ${mf('酒莊', titleCase(w.winery))} ${mf('年份', w.vintage)}
    ${mf('類型', w.type)} ${mf('國家', w.country ? countryFlag(w.country) + ' ' + w.country : '')}
    ${mf('產區', titleCase(w.region), true)}
    ${mf('葡萄品種', titleCase(w.grape), true)}
    ${mf('Alcohol By Volume', formatAlc(w.alcohol))} ${mf('參考價格', w.price ? 'NT$ ' + Number(w.price).toLocaleString() : '')}
    ${mf('開瓶日期', w.opened)}
    ${mf('釀造特色', w.notes, true)}
    ${mf('飲用心得', w.tasting, true)}
  `;
  document.getElementById('modalOverlay').classList.add('open');
};

function mf(label, val, full) {
  if (!val) return '';
  return `<div class="modal-field${full ? ' full' : ''}"><label>${label}</label><p>${esc(val)}</p></div>`;
}

window.closeModal = function() {
  document.getElementById('modalOverlay').classList.remove('open');
  modalWineId = null;
};

document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
});

let currentTastedRating = 0;

window.toggleTastedPanel = function() {
  const w = wines.find(w => w.id === modalWineId);
  if (!w) return;
  if (w.drunk) {
    if (!confirm('取消 Tasted 標記嗎？')) return;
    updateDoc(doc(db, 'wines', modalWineId), { drunk: false, rating: 0, tasting: '' })
      .then(() => { w.drunk = false; w.rating = 0;
        document.getElementById('tastedChip').classList.remove('active');
        document.getElementById('tastedPanel').style.display = 'none';
        showToast('Moved back to On Hand');
        renderWines();
      }).catch(() => showToast('更新失敗'));
    return;
  }
  const panel = document.getElementById('tastedPanel');
  panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
  if (panel.style.display === 'block') {
    const today = new Date().toISOString().slice(0,10);
    document.getElementById('tastedNotes').value = today;
    currentTastedRating = 0;
    updateStarPicks(0);
  }
};

window.pickStar = function(v) {
  currentTastedRating = v;
  updateStarPicks(v);
  const btn = document.getElementById('confirmTastedBtn');
  btn.style.opacity = '1';
  btn.style.cursor = 'pointer';
  btn.classList.add('ready');
};

function updateStarPicks(v) {
  document.querySelectorAll('.star-pick').forEach(b => {
    b.classList.toggle('lit', parseInt(b.dataset.v) <= v);
  });
}

window.confirmTasted = async function() {
  if (!currentTastedRating) return;
  if (!modalWineId) return;
  const notes = document.getElementById('tastedNotes').value;
  try {
    await updateDoc(doc(db, 'wines', modalWineId), {
      drunk: true, rating: currentTastedRating, tasting: notes
    });
    const w = wines.find(w => w.id === modalWineId);
    if (w) { w.drunk = true; w.rating = currentTastedRating; w.tasting = notes; }
    document.getElementById('tastedChip').classList.add('active');
    document.getElementById('tastedPanel').style.display = 'none';
    showToast('Moved to Tasted 🥂');
    closeModal();
    renderWines();
  } catch(e) { showToast('儲存失敗'); }
};

// Edit modal
window.openEditModal = function() {
  const w = wines.find(w => w.id === modalWineId);
  if (!w) return;
  const editingId = modalWineId;
  const fields = {
    'e-name': w.name, 'e-winery': w.winery, 'e-vintage': w.vintage,
    'e-country': w.country, 'e-region': w.region, 'e-grape': w.grape,
    'e-alcohol': w.alcohol, 'e-price': w.price, 'e-opened': w.opened,
    'e-tasting': w.tasting, 'e-notes': w.notes
  };
  Object.entries(fields).forEach(([id, val]) => {
    const el = document.getElementById(id);
    if (el) el.value = val || '';
  });
  document.getElementById('e-type').value = w.type || '紅酒';
  document.getElementById('modalOverlay').classList.remove('open');
  modalWineId = editingId;
  document.getElementById('editModalOverlay').classList.add('open');
};

window.closeEditModal = function() {
  document.getElementById('editModalOverlay').classList.remove('open');
};

document.getElementById('editModalOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('editModalOverlay')) closeEditModal();
});

document.getElementById('updateBtn').addEventListener('click', async () => {
  if (!modalWineId) return;
  document.getElementById('updateBtn').disabled = true;
  document.getElementById('updateBtn').textContent = 'Saving…';
  try {
    const updates = {
      name: document.getElementById('e-name').value,
      winery: document.getElementById('e-winery').value,
      vintage: document.getElementById('e-vintage').value,
      type: document.getElementById('e-type').value,
      country: document.getElementById('e-country').value,
      region: document.getElementById('e-region').value,
      grape: document.getElementById('e-grape').value,
      alcohol: document.getElementById('e-alcohol').value,
      price: document.getElementById('e-price').value,
      notes: document.getElementById('e-notes').value,
    };
    await updateDoc(doc(db, 'wines', modalWineId), updates);
    showToast('已儲存');
    closeEditModal();
    loadWines();
  } catch(e) { showToast('儲存失敗'); }
  document.getElementById('updateBtn').disabled = false;
  document.getElementById('updateBtn').textContent = 'Save';
});

document.getElementById('deleteBtn').addEventListener('click', async () => {
  if (!modalWineId || !confirm('確定要移除這瓶酒嗎？')) return;
  const w = wines.find(w => w.id === modalWineId);
  try {
    if (w.imagePath) await deleteObject(ref(storage, w.imagePath));
    await deleteDoc(doc(db, 'wines', modalWineId));
    closeModal();
    loadWines();
    showToast('已移除');
  } catch(e) { showToast('移除失敗'); }
});

// Toast
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

loadWines();

setTimeout(() => {
  const slider = document.getElementById('toggleSlider');
  if (slider) {
    slider.style.left = '3px';
    slider.style.width = 'calc(50% - 3px)';
  }
}, 100);
</script>
