<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Wine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,400;1,600&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --header-bg: #FAF6F0;
    --body-bg: #FFFFFF;
    --rose-gold: #C0826A;
    --ink: #3A2E28;
    --muted: #AA9080;
    --border: rgba(192,130,106,0.15);
    --border-strong: rgba(192,130,106,0.25);
    --shadow: rgba(58,46,40,0.06);
    --card-bg: #FFFFFF;
    --thumb-bg: #F5EDE4;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Lato', sans-serif;
    background: var(--body-bg);
    color: var(--ink);
    min-height: 100vh;
  }

  /* Header */
  header {
    background: var(--header-bg);
    padding: 1.5rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border-strong);
  }
  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    font-weight: 600;
    font-style: italic;
    color: var(--rose-gold);
    letter-spacing: 0.02em;
  }

  /* Layout */
  .main { padding: 1.5rem 2rem; min-height: calc(100vh - 80px); background: #fff; }

  @media (max-width: 768px) {
    header { padding: 1.25rem; }
    .logo { font-size: 1.5rem; }
    .main { padding: 1rem; }
  }

  /* FAB */
  .fab {
    position: fixed;
    bottom: 2rem;
    right: 2rem;
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: var(--rose-gold);
    border: none;
    color: #fff;
    font-size: 1.6rem;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(192,130,106,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s, transform 0.15s;
    z-index: 50;
    line-height: 1;
  }
  .fab:hover { background: #A86E58; transform: scale(1.08); }

  /* Add wine modal form styles */
  .add-modal-body { padding: 1.25rem 1.5rem; }

  /* Upload zone */
  .upload-zone {
    border: 1.5px dashed var(--border-strong);
    border-radius: 8px;
    padding: 1.5rem 1rem;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--thumb-bg);
    position: relative;
    margin-bottom: 1rem;
  }
  .upload-zone:hover { background: #EEE0D5; }
  .upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; }
  .upload-icon {
    font-size: 2rem;
    color: var(--rose-gold);
    margin-bottom: 0.5rem;
  }
  .upload-label { font-size: 0.85rem; color: var(--muted); line-height: 1.5; }

  /* Preview */
  .preview-wrap { margin-bottom: 1rem; text-align: center; }
  .preview-img {
    width: 100%;
    max-height: 220px;
    object-fit: contain;
    border-radius: 6px;
    border: 1px solid var(--border);
  }

  /* Form */
  .form-group { margin-bottom: 0.75rem; }
  .form-group label {
    display: block;
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.3rem;
  }
  .form-group input,
  .form-group select,
  .form-group textarea {
    width: 100%;
    padding: 0.5rem 0.7rem;
    border: 1px solid var(--border-strong);
    border-radius: 6px;
    background: #fff;
    font-family: 'Lato', sans-serif;
    font-size: 0.875rem;
    color: var(--ink);
    transition: border-color 0.2s;
  }
  .form-group input:focus,
  .form-group select:focus,
  .form-group textarea:focus {
    outline: none;
    border-color: var(--rose-gold);
  }
  .form-group textarea { resize: vertical; min-height: 60px; }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; }

  /* Buttons */
  .btn-analyze {
    width: 100%;
    padding: 0.65rem;
    background: var(--thumb-bg);
    color: var(--rose-gold);
    border: 1px solid var(--border-strong);
    border-radius: 6px;
    font-family: 'Lato', sans-serif;
    font-size: 0.85rem;
    font-weight: 400;
    cursor: pointer;
    transition: background 0.2s;
    margin-bottom: 0.5rem;
    letter-spacing: 0.03em;
  }
  .btn-analyze:hover:not(:disabled) { background: #EEE0D5; }
  .btn-analyze:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-save {
    width: 100%;
    padding: 0.65rem;
    background: var(--rose-gold);
    color: #fff;
    border: none;
    border-radius: 6px;
    font-family: 'Lato', sans-serif;
    font-size: 0.85rem;
    font-weight: 400;
    cursor: pointer;
    transition: background 0.2s;
    letter-spacing: 0.03em;
  }
  .btn-save:hover:not(:disabled) { background: #A86E58; }
  .btn-save:disabled { opacity: 0.5; cursor: not-allowed; }

  .analyzing-bar {
    text-align: center;
    padding: 0.75rem;
    font-size: 0.8rem;
    color: var(--muted);
    display: none;
  }
  .dot { animation: blink 1.2s infinite; display: inline-block; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,80%,100%{opacity:0.2} 40%{opacity:1} }

  /* Wine list */
  .wine-grid {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
    margin-top: 0;
  }

  .wine-card {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    transition: transform 0.2s, box-shadow 0.2s;
    cursor: pointer;
    animation: fadeUp 0.3s ease;
    display: flex;
    flex-direction: row;
    align-items: stretch;
  }
  .wine-card:hover {
    transform: translateX(3px);
    box-shadow: 0 4px 16px var(--shadow);
  }
  @keyframes fadeUp { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }

  .card-img {
    width: 90px;
    min-width: 90px;
    object-fit: cover;
    background: var(--thumb-bg);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .card-img img { width: 100%; height: 100%; object-fit: cover; }
  .card-img-placeholder {
    width: 90px;
    min-width: 90px;
    background: var(--thumb-bg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2rem;
    color: var(--rose-gold);
    flex-shrink: 0;
  }

  .card-body {
    padding: 0.85rem 1rem;
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    min-width: 0;
  }
  .card-name {
    font-family: 'Playfair Display', serif;
    font-size: 1.05rem;
    font-weight: 600;
    font-style: italic;
    color: var(--ink);
    margin-bottom: 2px;
    line-height: 1.3;
  }
  .card-winery { font-size: 0.78rem; color: var(--muted); margin-bottom: 6px; font-family: 'Lato', sans-serif; }
  .card-region { font-size: 0.75rem; color: var(--muted); margin-top: 4px; font-family: 'Lato', sans-serif; }
  .card-meta { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }

  .badge {
    font-size: 0.65rem;
    padding: 2px 7px;
    border-radius: 99px;
    font-weight: 500;
    letter-spacing: 0.04em;
    font-family: 'Lato', sans-serif;
  }
  .badge-red { background: #FCEEE9; color: #A0522D; }
  .badge-white { background: #FBF6E3; color: #7A6200; }
  .badge-rose { background: #FCEEF3; color: #8B3052; }
  .badge-sparkling { background: #E8F2FB; color: #1A5F8A; }
  .badge-year { background: var(--thumb-bg); color: var(--muted); }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--muted);
  }
  .empty-state-icon { font-size: 3rem; margin-bottom: 1rem; opacity: 0.4; }
  .empty-state p { font-size: 0.9rem; line-height: 1.6; font-family: 'Lato', sans-serif; }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(58,46,40,0.5);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: #fff;
    border-radius: 12px;
    max-width: 560px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    animation: fadeUp 0.25s ease;
  }
  .modal-header {
    padding: 1.25rem 1.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--header-bg);
  }
  .modal-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem;
    font-weight: 600;
    font-style: italic;
    color: var(--rose-gold);
  }
  .modal-close {
    background: none; border: none; cursor: pointer;
    font-size: 1.2rem; color: var(--muted); padding: 4px;
  }
  .modal-body { padding: 1.5rem; }
  .modal-img {
    width: 100%;
    max-height: 280px;
    object-fit: contain;
    border-radius: 8px;
    margin-bottom: 1.25rem;
    border: 1px solid var(--border);
  }
  .modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem 1.5rem; }
  .modal-field label { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); font-weight: 400; display: block; margin-bottom: 2px; font-family: 'Lato', sans-serif; }
  .modal-field p { font-size: 0.9rem; color: var(--ink); font-family: 'Lato', sans-serif; }
  .modal-field.full { grid-column: span 2; }
  .modal-actions {
    padding: 1rem 1.5rem;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 0.5rem;
    justify-content: flex-end;
  }
  .btn-delete {
    padding: 0.5rem 1rem;
    border: 1px solid #fca5a5;
    background: transparent;
    color: #dc2626;
    border-radius: 6px;
    font-size: 0.82rem;
    cursor: pointer;
    font-family: 'Lato', sans-serif;
    transition: all 0.15s;
  }
  .btn-delete:hover { background: #fef2f2; }

  .toast {
    position: fixed;
    bottom: 2rem;
    right: 2rem;
    background: var(--ink);
    color: #fff;
    padding: 0.75rem 1.25rem;
    border-radius: 8px;
    font-size: 0.85rem;
    z-index: 200;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.3s;
    pointer-events: none;
    font-family: 'Lato', sans-serif;
  }
  .toast.show { opacity: 1; transform: translateY(0); }

  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 0.75rem 0;
  }

  .form-group label {
    display: block;
    font-size: 0.7rem;
    font-weight: 400;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.3rem;
    font-family: 'Lato', sans-serif;
  }
</style>
</head>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyCwUGWS2R58Ys_aqTfSD44WqsFo3OcdLMk",
  authDomain: "wine-60184.firebaseapp.com",
  projectId: "wine-60184",
  storageBucket: "wine-60184.firebasestorage.app",
  messagingSenderId: "589747615031",
  appId: "1:589747615031:web:d7a594db8ddc602c3096b2"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

let currentFile1 = null;
let currentFile2 = null;
let wines = [];
let modalWineId = null;

// File upload - 正面
document.getElementById('fileInput1').addEventListener('change', e => {
  const f = e.target.files[0];
  if (!f) return;
  currentFile1 = f;
  const reader = new FileReader();
  reader.onload = ev => {
    document.getElementById('previewImg1').src = ev.target.result;
    document.getElementById('previewWrap1').style.display = 'block';
  };
  reader.readAsDataURL(f);
  document.getElementById('analyzeBtn').disabled = false;
});

// File upload - 背面
document.getElementById('fileInput2').addEventListener('change', e => {
  const f = e.target.files[0];
  if (!f) return;
  currentFile2 = f;
  const reader = new FileReader();
  reader.onload = ev => {
    document.getElementById('previewImg2').src = ev.target.result;
    document.getElementById('previewWrap2').style.display = 'block';
  };
  reader.readAsDataURL(f);
});

// Analyze
document.getElementById('analyzeBtn').addEventListener('click', async () => {
  if (!currentFile1) return;
  document.getElementById('analyzeBtn').disabled = true;
  document.getElementById('analyzingBar').style.display = 'block';

  try {
    console.log('開始辨識...');
    const images = [];
    const b64_1 = await compressImage(currentFile1);
    images.push({ mime_type: 'image/jpeg', data: b64_1 });
    if (currentFile2) {
      const b64_2 = await compressImage(currentFile2);
      images.push({ mime_type: 'image/jpeg', data: b64_2 });
    }
    console.log('照片準備好，呼叫 Worker...');

    const resp = await fetch('https://wine.u8934039.workers.dev', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ images })
    });

    console.log('Worker 回應狀態：', resp.status);
    const text = await resp.text();
    console.log('Worker 回傳內容：', text);
    const info = JSON.parse(text);
    fillForm(info);
    showToast('辨識完成，請確認資料');
  } catch(e) {
    console.error('辨識錯誤：', e);
    showToast('辨識失敗，請手動填寫');
  }

  document.getElementById('analyzeBtn').disabled = false;
  document.getElementById('analyzingBar').style.display = 'none';
});

function fillForm(info) {
  const map = { name:'f-name', winery:'f-winery', vintage:'f-vintage', type:'f-type', country:'f-country', region:'f-region', grape:'f-grape', alcohol:'f-alcohol', notes:'f-notes' };
  Object.entries(map).forEach(([k, id]) => {
    const el = document.getElementById(id);
    if (el && info[k]) el.value = info[k];
  });
}

function toBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(',')[1]);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

function compressImage(file, maxWidth = 1024, quality = 0.7) {
  return new Promise((res) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      const canvas = document.createElement('canvas');
      let w = img.width, h = img.height;
      if (w > maxWidth) { h = Math.round(h * maxWidth / w); w = maxWidth; }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      URL.revokeObjectURL(url);
      canvas.toBlob(blob => {
        const reader = new FileReader();
        reader.onload = () => res(reader.result.split(',')[1]);
        reader.readAsDataURL(blob);
      }, 'image/jpeg', quality);
    };
    img.src = url;
  });
}

// Save
document.getElementById('saveBtn').addEventListener('click', async () => {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { showToast('請至少填入酒名'); return; }

  document.getElementById('saveBtn').disabled = true;
  document.getElementById('saveBtn').textContent = '儲存中…';

  try {
    let imageUrl = '';
    let imagePath = '';

    if (currentFile1) {
      imagePath = `labels/${Date.now()}_${currentFile1.name}`;
      const storageRef = ref(storage, imagePath);
      await uploadBytes(storageRef, currentFile1);
      imageUrl = await getDownloadURL(storageRef);
    }

    const wine = {
      name,
      winery: document.getElementById('f-winery').value,
      vintage: document.getElementById('f-vintage').value,
      type: document.getElementById('f-type').value,
      country: document.getElementById('f-country').value,
      region: document.getElementById('f-region').value,
      grape: document.getElementById('f-grape').value,
      alcohol: document.getElementById('f-alcohol').value,
      price: document.getElementById('f-price').value,
      opened: document.getElementById('f-opened').value,
      tasting: document.getElementById('f-tasting').value,
      notes: document.getElementById('f-notes').value,
      imageUrl,
      imagePath,
      createdAt: new Date().toISOString()
    };

    await addDoc(collection(db, 'wines'), wine);
    showToast('已加入酒窖 🍷');
    closeAddModal();
    resetForm();
    loadWines();
  } catch(e) {
    showToast('儲存失敗：' + e.message);
  }

  document.getElementById('saveBtn').disabled = false;
  document.getElementById('saveBtn').textContent = '加入酒窖';
});

function resetForm() {
  ['f-name','f-winery','f-vintage','f-country','f-region','f-grape','f-alcohol','f-price','f-notes','f-opened','f-tasting'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('f-type').value = '紅酒';
  currentFile1 = null;
  currentFile2 = null;
  document.getElementById('previewWrap1').style.display = 'none';
  document.getElementById('previewWrap2').style.display = 'none';
  document.getElementById('analyzeBtn').disabled = true;
  document.getElementById('fileInput1').value = '';
  document.getElementById('fileInput2').value = '';
}

// Load wines
async function loadWines() {
  const q = query(collection(db, 'wines'), orderBy('createdAt', 'desc'));
  const snap = await getDocs(q);
  wines = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  renderWines();
}

function countryFlag(country) {
  const map = {
    '義大利':'🇮🇹','法國':'🇫🇷','美國':'🇺🇸','西班牙':'🇪🇸','德國':'🇩🇪',
    '澳洲':'🇦🇺','智利':'🇨🇱','阿根廷':'🇦🇷','紐西蘭':'🇳🇿','南非':'🇿🇦',
    '葡萄牙':'🇵🇹','奧地利':'🇦🇹','希臘':'🇬🇷','匈牙利':'🇭🇺','日本':'🇯🇵',
    '台灣':'🇹🇼','中國':'🇨🇳','英國':'🇬🇧','加拿大':'🇨🇦','以色列':'🇮🇱',
    '黎巴嫩':'🇱🇧','喬治亞':'🇬🇪','克羅埃西亞':'🇭🇷','斯洛維尼亞':'🇸🇮',
  };
  return map[country] || '🌍';
}

function renderWines() {
  const grid = document.getElementById('wineGrid');

  if (!wines.length) {
    grid.innerHTML = `<div class="empty-state"><div class="empty-state-icon">🍾</div><p>酒窖尚無藏酒<br>點右下角 ＋ 開始建檔</p></div>`;
    return;
  }

  grid.innerHTML = wines.map(w => {
    const badgeClass = {'紅酒':'badge-red','白酒':'badge-white','粉紅酒':'badge-rose','氣泡酒':'badge-sparkling'}[w.type] || 'badge-red';
    const imgHtml = w.imageUrl
      ? `<div class="card-img"><img src="${w.imageUrl}" alt="${esc(w.name)}" loading="lazy"></div>`
      : `<div class="card-img-placeholder">🍷</div>`;
    return `<div class="wine-card" onclick="openModal('${w.id}')">
      ${imgHtml}
      <div class="card-body">
        <div class="card-name">${esc(w.name)}</div>
        <div class="card-winery">${esc(w.winery || '')}</div>
        <div class="card-meta">
          <span class="badge ${badgeClass}">${esc(w.type)}</span>
          ${w.vintage ? `<span class="badge badge-year">${esc(w.vintage)}</span>` : ''}
          ${w.country ? `<span style="font-size:1rem">${countryFlag(w.country)}</span>` : ''}
        </div>
        ${w.region ? `<div class="card-region">${esc(w.region)}</div>` : ''}
        ${w.price ? `<div class="card-price" style="font-size:0.75rem;color:var(--muted);margin-top:4px;font-family:'Lato',sans-serif">NT$ ${esc(w.price)}</div>` : ''}
      </div>
    </div>`;
  }).join('');
}

// Add wine modal
window.openAddModal = function() {
  document.getElementById('addModalOverlay').classList.add('open');
};
window.closeAddModal = function() {
  document.getElementById('addModalOverlay').classList.remove('open');
};
document.getElementById('addModalOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('addModalOverlay')) closeAddModal();
});

// Detail Modal
window.openModal = function(id) {
  const w = wines.find(w => w.id === id);
  if (!w) return;
  modalWineId = id;
  document.getElementById('modalTitle').textContent = w.name;

  const img = document.getElementById('modalImg');
  if (w.imageUrl) { img.src = w.imageUrl; img.style.display = 'block'; }
  else img.style.display = 'none';

  document.getElementById('modalGrid').innerHTML = `
    ${mf('酒莊', w.winery)} ${mf('年份', w.vintage)}
    ${mf('類型', w.type)} ${mf('國家', w.country ? countryFlag(w.country) + ' ' + w.country : '')}
    ${mf('產區', w.region, true)}
    ${mf('葡萄品種', w.grape, true)}
    ${mf('酒精濃度', w.alcohol)} ${mf('參考價格', w.price ? 'NT$ ' + w.price : '')}
    ${mf('開瓶日期', w.opened)}
    ${mf('釀造特色', w.notes, true)}
    ${mf('飲用心得', w.tasting, true)}
  `;
  document.getElementById('modalOverlay').classList.add('open');
};

function mf(label, val, full) {
  if (!val) return '';
  return `<div class="modal-field${full ? ' full' : ''}"><label>${label}</label><p>${esc(val)}</p></div>`;
}

window.closeModal = function() {
  document.getElementById('modalOverlay').classList.remove('open');
  modalWineId = null;
};

document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
});

document.getElementById('deleteBtn').addEventListener('click', async () => {
  if (!modalWineId || !confirm('確定要移除這瓶酒嗎？')) return;
  const w = wines.find(w => w.id === modalWineId);
  try {
    if (w.imagePath) await deleteObject(ref(storage, w.imagePath));
    await deleteDoc(doc(db, 'wines', modalWineId));
    closeModal();
    loadWines();
    showToast('已移除');
  } catch(e) {
    showToast('移除失敗');
  }
});

// Toast
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

loadWines();
</script>
</body>
</html>
